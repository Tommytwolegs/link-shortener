<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Link Shortener</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="hero">
    <div class="mark" aria-hidden="true">
      <!-- Inline mini version of the product icon: long messy bar shortening
           into a clean bar, mirroring the browser-toolbar icon. -->
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="0" width="48" height="48" rx="10" fill="url(#bg)"/>
        <defs>
          <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#1B2A4E"/>
            <stop offset="100%" stop-color="#0F7B8A"/>
          </linearGradient>
        </defs>
        <rect x="6" y="13" width="36" height="5" rx="2.5" fill="#FF9900"/>
        <path d="M18 24 L24 30 L30 24" stroke="#FF9900" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <rect x="14" y="34" width="20" height="5" rx="2.5" fill="#FF9900"/>
      </svg>
    </div>
    <div class="title">
      <h1>Link Shortener</h1>
      <p class="subtitle" id="status">Loading...</p>
    </div>
  </header>

  <section class="toggle-row">
    <label class="switch" for="enabled">
      <span class="switch-label">Shorten All Links</span>
      <span class="switch-control">
        <input type="checkbox" id="enabled" />
        <span class="slider" aria-hidden="true"></span>
      </span>
    </label>

    <label class="switch switch-secondary" for="hideTravelPopup">
      <span class="switch-label">Hide travel popup</span>
      <span class="switch-control">
        <input type="checkbox" id="hideTravelPopup" />
        <span class="slider" aria-hidden="true"></span>
      </span>
    </label>

    <label class="switch switch-secondary" for="includeAmazonTitle">
      <span class="switch-label">Include Amazon item name</span>
      <span class="switch-control">
        <input type="checkbox" id="includeAmazonTitle" />
        <span class="slider" aria-hidden="true"></span>
      </span>
    </label>
  </section>

  <section class="site-toggles" id="site-toggles">
    <p class="site-toggles-heading">Per site</p>

    <label class="switch switch-sm" for="enabledAmazon">
      <span class="switch-label">Amazon</span>
      <span class="switch-control switch-control-sm">
        <input type="checkbox" id="enabledAmazon" data-site="Amazon" />
        <span class="slider" aria-hidden="true"></span>
      </span>
    </label>

    <label class="switch switch-sm" for="enabledAgoda">
      <span class="switch-label">Agoda</span>
      <span class="switch-control switch-control-sm">
        <input type="checkbox" id="enabledAgoda" data-site="Agoda" />
        <span class="slider" aria-hidden="true"></span>
      </span>
    </label>

    <label class="switch switch-sm" for="enabledBooking">
      <span class="switch-label">Booking.com</span>
      <span class="switch-control switch-control-sm">
        <input type="checkbox" id="enabledBooking" data-site="Booking" />
        <span class="slider" aria-hidden="true"></span>
      </span>
    </label>

    <label class="switch switch-sm" for="enabledExpedia">
      <span class="switch-label">Expedia</span>
      <span class="switch-control switch-control-sm">
        <input type="checkbox" id="enabledExpedia" data-site="Expedia" />
        <span class="slider" aria-hidden="true"></span>
      </span>
    </label>

    <label class="switch switch-sm" for="enabledAirbnb">
      <span class="switch-label">Airbnb</span>
      <span class="switch-control switch-control-sm">
        <input type="checkbox" id="enabledAirbnb" data-site="Airbnb" />
        <span class="slider" aria-hidden="true"></span>
      </span>
    </label>

    <label class="switch switch-sm" for="enabledSocial">
      <span class="switch-label">Facebook/Instagram</span>
      <span class="switch-control switch-control-sm">
        <input type="checkbox" id="enabledSocial" data-site="Social" />
        <span class="slider" aria-hidden="true"></span>
      </span>
    </label>

    <label class="switch switch-sm" for="enabledYoutube">
      <span class="switch-label">YouTube</span>
      <span class="switch-control switch-control-sm">
        <input type="checkbox" id="enabledYoutube" data-site="Youtube" />
        <span class="slider" aria-hidden="true"></span>
      </span>
    </label>

    <label class="switch switch-sm" for="enabledTwitter">
      <span class="switch-label">Twitter / X</span>
      <span class="switch-control switch-control-sm">
        <input type="checkbox" id="enabledTwitter" data-site="Twitter" />
        <span class="slider" aria-hidden="true"></span>
      </span>
    </label>

    <label class="switch switch-sm" for="enabledTiktok">
      <span class="switch-label">TikTok</span>
      <span class="switch-control switch-control-sm">
        <input type="checkbox" id="enabledTiktok" data-site="Tiktok" />
        <span class="slider" aria-hidden="true"></span>
      </span>
    </label>

    <label class="switch switch-sm" for="enabledReddit">
      <span class="switch-label">Reddit</span>
      <span class="switch-control switch-control-sm">
        <input type="checkbox" id="enabledReddit" data-site="Reddit" />
        <span class="slider" aria-hidden="true"></span>
      </span>
    </label>

    <label class="switch switch-sm" for="enabledSpotify">
      <span class="switch-label">Spotify</span>
      <span class="switch-control switch-control-sm">
        <input type="checkbox" id="enabledSpotify" data-site="Spotify" />
        <span class="slider" aria-hidden="true"></span>
      </span>
    </label>
  </section>

  <section class="info">
    <p>Long URLs on supported sites are rewritten in place. Right-click "Copy
       link address" gives the short form too. Toggle individual sites above.</p>
  </section>

  <footer>
    <span id="version"></span>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
